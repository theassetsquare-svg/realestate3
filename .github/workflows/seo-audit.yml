name: SEO Audit + 24h 모니터 (자동)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다 (하루 4회) 자동 점검
  workflow_dispatch:

permissions:
  contents: read
  issues: write            # 문제 발견 시 Issue 생성 → 소유자 Gmail 알림

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 1) 구조화데이터(JSON-LD) 자동 재생성 — idempotent
      - name: Regenerate structured data
        run: node scripts/enrich-schema.mjs

      # 2) 스키마 드리프트 감지
      - name: Check schema freshness
        run: |
          if ! git diff --quiet; then
            echo "::error::구조화데이터가 최신이 아닙니다. 'node scripts/enrich-schema.mjs' 실행 후 커밋하세요."
            git --no-pager diff --stat
            exit 1
          fi
          echo "✅ 구조화데이터 최신"

      # 3) 정밀 SEO 검증 (스터핑/중복/링크/메타/JSON-LD/Breadcrumb/FAQ/전화번호금지)
      - name: Run SEO audit
        run: node scripts/seo-audit.mjs

      # 4) 구글 Rich Results 규칙 검증
      - name: Validate Rich Results rules
        run: node scripts/validate-richresults.mjs --local

      # 5) 버그/디버깅 스캔
      - name: Debug scan
        run: node scripts/debug-scan.mjs

      # 6) 24h 라이브 모니터 — 헬스체크 + GSC 색인 + Core Web Vitals
      - name: Live monitor (health + GSC index + CWV)
        env:
          GSC_SA_KEY: ${{ secrets.GSC_SA_KEY }}
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
        run: node scripts/monitor-24h.mjs

      # 7) 실패 시 → GitHub Issue 생성(소유자 Gmail로 자동 알림)
      - name: Alert on failure (이메일 발송)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '점검 중 오류 발생. 워크플로 로그를 확인하세요.';
            try { report = fs.readFileSync('monitor-report.md', 'utf8'); } catch (e) {}
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `🔴 realestate3 사이트 점검 실패 — ${new Date().toISOString().slice(0,10)}`;
            const body = `자동 점검에서 문제가 발견되었습니다.\n\n${report}\n\n---\n🔗 [워크플로 로그 보기](${runUrl})\n\n_이 알림은 6시간마다 자동 점검에서 발송됩니다._`;
            // 기존 열린 알림 Issue 있으면 코멘트, 없으면 새로 생성 (스팸 방지)
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'site-health'
            });
            if (issues.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['site-health', 'automated'],
                assignees: [context.repo.owner]
              });
            }
