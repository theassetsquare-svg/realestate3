name: SEO Audit (24h 자동검증)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다 (하루 4회) 자동 점검
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run SEO audit
        run: node scripts/seo-audit.mjs
