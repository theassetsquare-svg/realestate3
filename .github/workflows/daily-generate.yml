name: 매일 자동생성 (청약홈 연동·자동종료·IndexNow)

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 21:00 UTC = 06:00 KST
  workflow_dispatch:

permissions:
  contents: write          # 변경분 커밋/푸시 → CF Pages 배포
  issues: write            # 실패 시 알림 Issue(소유자 Gmail)

concurrency:
  group: daily-generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      # 1) 청약홈 동기화(실데이터) + 만료 자동종료  ※ DATA_GO_KR_KEY 없으면 기존 SSOT 유지
      - name: Sync listings (청약홈 + 자동종료)
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: node scripts/sync-listings.mjs

      # 2) 신규 현장 페이지 생성 → 상태/출처 반영 → 스키마/관련현장/사이트맵
      - name: Generate new + apply status + schema + related + sitemap
        run: |
          node scripts/gen-listing.mjs
          node scripts/apply-status.mjs
          node scripts/enrich-schema.mjs
          node scripts/related-links.mjs
          node scripts/gen-sitemap.mjs

      # 3) ★콘텐츠 게이트(누적) — 위반 시 배포 차단
      - name: Content gate (누적)
        run: node scripts/content-gate.mjs

      # 4) 정밀 SEO/버그 검증
      - name: Audits
        run: |
          node scripts/seo-audit.mjs
          node scripts/debug-scan.mjs

      # 5) 변경분 커밋·푸시(있을 때만) → CF Pages 자동 배포
      - name: Commit & push if changed
        run: |
          git config user.name "theassetsquare"
          git config user.email "theassetsquare@gmail.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore(auto): 청약홈 동기화·자동종료·재생성 $(date -u +%F)"
            git push
            echo "PUSHED=1" >> $GITHUB_ENV
          else
            echo "변경 없음 — 스킵"
          fi

      # 6) IndexNow 제출(푸시된 경우만)
      - name: IndexNow submit
        if: env.PUSHED == '1'
        run: node scripts/indexnow.mjs

      # 7) ★실패 시에만 메일(성공 메일 0) — 알림 Issue 생성/코멘트 → 소유자 Gmail
      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🔴 realestate3 매일 자동생성 실패 — ${new Date().toISOString().slice(0,10)}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `매일 자동생성 파이프라인이 실패했습니다.\n\n🔗 [로그](${runUrl})\n\n_성공 시 메일은 발송하지 않습니다._`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'auto-generate' });
            if (issues.length) await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issues[0].number, body });
            else await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo, title, body,
              labels: ['auto-generate','automated'], assignees: [context.repo.owner] });
